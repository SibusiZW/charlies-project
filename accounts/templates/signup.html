<!DOCTYPE html>
<html>
    <head>
        <title>BingeHacks | Sign Up</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pacifico&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com/"></script>

        <style>
            .inter {
                font-family: "Inter", sans-serif;
                font-style: normal;
            }

            .pacifico {
                font-family: "Pacifico", sans-serif;
                font-style: normal;
            }
        </style>
    </head>

    <body class="inter min-h-screen flex flex-col p-6 items-center justify-center w-full bg-[#dddddd]">
    <div class="bg-white w-full text-center max-w-[450px] p-6 rounded-[10px]">
        <h1 class="pacifico text-3xl mb-4">Binge<span class="text-indigo-500">Hacks</span></h1>
        
        <form method="post">
            <input name="email" placeholder="Enter your email" type="email" class="w-full p-2 border border-indigo-500 rounded-md mb-2" required/>
            <input name="usr" placeholder="Enter your username" type="text" class="w-full p-2 border border-indigo-500 rounded-md mb-2" required/>
            <input name="pwd" placeholder="Enter your password" type="password" class="w-full p-2 border border-indigo-500 rounded-md mb-2" required/>
            <button class="p-2 bg-indigo-500 hover:bg-indigo-700 w-full text-white rounded-[10px] mb-4" type="submit">
                Sign Up
            </button>

            <span class="text-gray-500">Alraedy have an account? <a href="{% url 'login' %}" class="underline">Log In</a></span>
        </form>
    </div>
    </body>

</html>
